title: 'Contact Us'
tabs:
  main:
    display: Main
    sections:
      -
        fields:
          -
            handle: first_name
            field:
              type: text
              display: 'First Name'
              validate:
                - required
                - 'max:500'
          -
            handle: last_name
            field:
              type: text
              display: 'Last Name'
              validate:
                - required
                - 'max:500'
          -
            handle: email
            field:
              type: text
              display: Email
              input_type: email
              validate:
                - required
                - email
                - 'max:500'
          -
            handle: phone
            field:
              type: text
              display: Phone
              validate:
                - required
                - 'max:500'
          -
            handle: comments
            field:
              type: textarea
              display: Comments
              validate:
                - required
                - 'max:5000'
