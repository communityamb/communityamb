title: Page
tabs:
  main:
    display: Main
    sections:
      -
        fields:
          -
            handle: title
            field:
              type: text
              required: true
              display: Title
          -
            handle: content
            field:
              type: bard
              display: Content
              buttons:
                - h2
                - h3
                - bold
                - italic
                - unorderedlist
                - orderedlist
                - anchor
                - image
              container: assets
          -
            handle: template
            field:
              type: select
              display: Template
              instructions: 'Choose the page layout. Most pages use Default. Specific pages (forms, gallery, team, etc.) have dedicated templates.'
              options:
                default: Default
                home: Home
                team: Team
                programs-index: Programs Index
                gallery: Gallery
                form-join: Join Community Form
                form-contact: Contact Us Form
                form-youth: Youth Squad Form
                events-index: Events
                video-gallery: Video Gallery
                history-timeline: History Timeline
                5k: 5K Run
                chiefs-corner: Chief's Corner
                program-detail: Program Detail
              default: default
  hero:
    display: Hero
    sections:
      -
        fields:
          -
            handle: hero_image
            field:
              type: assets
              display: Hero Image
              container: assets
              max_files: 1
          -
            handle: hero_subtitle
            field:
              type: text
              display: Hero Subtitle
  seo:
    display: SEO
    sections:
      -
        fields:
          -
            handle: meta_title
            field:
              type: text
              display: Meta Title
              instructions: 'Override the page title shown in browser tabs and search results. Leave blank to use the page title.'
              character_limit: 70
          -
            handle: meta_description
            field:
              type: textarea
              display: Meta Description
              instructions: 'Override the default site description for this page. Recommended: 150-160 characters.'
              character_limit: 160
          -
            handle: og_image
            field:
              type: assets
              display: Social Share Image
              instructions: 'Image shown when this page is shared on social media. Recommended: 1200x630px.'
              container: assets
              max_files: 1
  call_counts:
    display: Call Counts
    sections:
      -
        fields:
          -
            handle: show_call_counts
            field:
              type: toggle
              display: Show Call Counts Section
              instructions: 'Enable to show the call count statistics section on this page. Counts are managed in the Call Counts global.'
              default: false
  youth_squad:
    display: Youth Squad
    sections:
      -
        instructions: 'Controls the "applications closed" banner and popup on the Youth Squad page.'
        fields:
          -
            handle: applications_closed
            field:
              type: toggle
              display: Applications Closed
              instructions: 'When enabled, shows a banner and popup indicating applications are closed, and hides the application form.'
              default: false
              if:
                template: 'equals form-youth'
          -
            handle: closed_school_year
            field:
              type: text
              display: School Year
              instructions: 'e.g. "2025/26"'
              if:
                template: 'equals form-youth'
                applications_closed: 'equals true'
  cta:
    display: Call to Action
    sections:
      -
        fields:
          -
            handle: show_cta
            field:
              type: toggle
              display: Show CTA Section
              default: false
          -
            handle: cta_title
            field:
              type: text
              display: CTA Title
              if:
                show_cta: 'equals true'
          -
            handle: cta_button_text
            field:
              type: text
              display: CTA Button Text
              if:
                show_cta: 'equals true'
          -
            handle: cta_button_link
            field:
              type: link
              display: CTA Button Link
              if:
                show_cta: 'equals true'
