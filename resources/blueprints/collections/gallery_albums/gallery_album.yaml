title: Gallery Album
tabs:
  main:
    display: Main
    sections:
      -
        fields:
          -
            handle: title
            field:
              type: text
              required: true
              display: Album Name
          -
            handle: description
            field:
              type: textarea
              display: Description
          -
            handle: photos
            field:
              type: assets
              display: Photos
              container: assets
              mode: grid
          -
            handle: date
            field:
              type: date
              display: Album Date
          -
            handle: sort_order
            field:
              type: integer
              display: Sort Order
              default: 99
  seo:
    display: SEO
    sections:
      -
        fields:
          -
            handle: meta_title
            field:
              type: text
              display: Meta Title
              instructions: 'Override the page title shown in browser tabs and search results. Leave blank to use the page title.'
              character_limit: 70
          -
            handle: meta_description
            field:
              type: textarea
              display: Meta Description
              instructions: 'Override the default site description for this album. Recommended: 150-160 characters.'
              character_limit: 160
          -
            handle: og_image
            field:
              type: assets
              display: Social Share Image
              instructions: 'Image shown when this album is shared on social media. Falls back to first photo.'
              container: assets
              max_files: 1
