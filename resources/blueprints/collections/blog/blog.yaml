title: Blog Post
tabs:
  main:
    display: Main
    sections:
      -
        fields:
          -
            handle: title
            field:
              type: text
              required: true
              display: Title
          -
            handle: content
            field:
              type: bard
              display: Content
              buttons:
                - h2
                - h3
                - bold
                - italic
                - unorderedlist
                - orderedlist
                - anchor
                - image
              container: assets
          -
            handle: featured_image
            field:
              type: assets
              display: Featured Image
              container: assets
              max_files: 1
          -
            handle: author
            field:
              type: users
              display: Author
              max_items: 1
          -
            handle: excerpt
            field:
              type: textarea
              display: Excerpt
  seo:
    display: SEO
    sections:
      -
        fields:
          -
            handle: meta_title
            field:
              type: text
              display: Meta Title
              instructions: 'Override the page title shown in browser tabs and search results. Leave blank to use the page title.'
              character_limit: 70
          -
            handle: meta_description
            field:
              type: textarea
              display: Meta Description
              instructions: 'Override the default site description for this post. Recommended: 150-160 characters.'
              character_limit: 160
          -
            handle: og_image
            field:
              type: assets
              display: Social Share Image
              instructions: 'Image shown when this post is shared on social media. Falls back to Featured Image.'
              container: assets
              max_files: 1
