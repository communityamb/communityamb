title: Organization
tabs:
  main:
    display: Organization Info
    sections:
      -
        fields:
          -
            handle: org_name
            field:
              type: text
              display: Organization Name
          -
            handle: phone
            field:
              type: text
              display: Phone Number
          -
            handle: email
            field:
              type: text
              display: Email
              input_type: email
          -
            handle: street_address
            field:
              type: text
              display: Street Address
          -
            handle: mailing_address
            field:
              type: text
              display: Mailing Address
          -
            handle: logo_url
            field:
              type: text
              display: Logo URL
              instructions: 'Path to the organization logo (e.g., /assets/images/logo.png)'
          -
            handle: description
            field:
              type: textarea
              display: Description
          -
            handle: site_url
            field:
              type: text
              display: Site URL
              instructions: 'Full site URL including https:// (e.g., https://communityamb.org). Used for canonical URLs and structured data.'
          -
            handle: default_og_image
            field:
              type: assets
              display: Default Social Share Image
              instructions: 'Default image shown when pages are shared on social media. Recommended: 1200x630px.'
              container: assets
              max_files: 1
