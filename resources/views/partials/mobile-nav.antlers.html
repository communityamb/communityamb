<div x-show="mobileMenuOpen" x-transition:enter="transition ease-out duration-200" x-transition:enter-start="opacity-0 -translate-y-2" x-transition:enter-end="opacity-100 translate-y-0" x-transition:leave="transition ease-in duration-150" x-transition:leave-start="opacity-100 translate-y-0" x-transition:leave-end="opacity-0 -translate-y-2" class="lg:hidden bg-white border-b border-border-light shadow-lg" x-cloak>
    <nav class="max-w-7xl mx-auto px-4 py-4 space-y-1" x-data="{ openSection: null }">
        {{ nav:main max_depth="2" }}
            {{ if children }}
            <div>
                <button @click="openSection = openSection === '{{ title }}' ? null : '{{ title }}'" class="w-full flex items-center justify-between px-3 py-2 text-text-secondary hover:text-brand-green text-sm font-medium">
                    {{ title }}
                    <svg :class="openSection === '{{ title }}' ? 'rotate-180' : ''" class="w-4 h-4 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                </button>
                <div x-show="openSection === '{{ title }}'" x-collapse class="ml-4 space-y-1">
                    <a href="{{ url }}" class="block px-3 py-1.5 text-sm text-text-muted hover:text-brand-green">{{ title }} Overview</a>
                    {{ children }}
                    <a href="{{ url }}" class="block px-3 py-1.5 text-sm text-text-muted hover:text-brand-green {{ if is_current }} text-brand-green {{ /if }}">{{ title }}</a>
                    {{ /children }}
                </div>
            </div>
            {{ else }}
            <a href="{{ url }}" class="block px-3 py-2 text-sm font-medium text-text-secondary hover:text-brand-green {{ if is_current }} text-brand-green {{ /if }}">{{ title }}</a>
            {{ /if }}
        {{ /nav:main }}

        <div class="pt-4 mt-4 border-t border-border-light flex flex-col gap-2">
            <a href="tel:{{ organization:phone }}" class="flex items-center gap-2 px-3 py-2 text-sm text-text-secondary">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"></path></svg>
                {{ organization:phone }}
            </a>
            {{ social_links }}
            {{ if venmo_url }}
            <a href="{{ venmo_url }}" target="_blank" rel="noopener" class="mx-3 bg-brand-green text-white text-sm font-semibold px-4 py-2 rounded text-center hover:bg-brand-green-dark transition">
                Donate
            </a>
            {{ /if }}
            {{ /social_links }}
        </div>
    </nav>
</div>
