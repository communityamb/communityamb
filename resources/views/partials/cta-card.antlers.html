<div class="bg-white rounded-lg shadow-md overflow-hidden hover:shadow-lg transition group">
    {{ if image }}
    <div class="aspect-video overflow-hidden">
        <img src="{{ image }}" alt="{{ title }}" class="w-full h-full object-cover group-hover:scale-105 transition duration-300">
    </div>
    {{ /if }}
    <div class="p-6">
        <h3 class="font-heading text-lg font-semibold text-text-primary mb-2">{{ title }}</h3>
        {{ if description }}
        <p class="text-sm text-text-secondary mb-4">{{ description }}</p>
        {{ /if }}
        {{ if url }}
        <a href="{{ url }}" class="inline-flex items-center gap-1 text-sm font-medium text-brand-green hover:text-brand-green-dark transition">
            Learn More
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
        </a>
        {{ /if }}
    </div>
</div>
