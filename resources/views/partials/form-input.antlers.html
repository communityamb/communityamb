<label for="{{ name }}" class="{{ label_class ?? 'block text-base font-medium text-text-secondary mb-2 font-display' }}">{{ label }}{{ if required == "true" }} <span class="text-red-500">*</span>{{ /if }}</label>
<input type="{{ type ?? 'text' }}" name="{{ name }}" id="{{ name }}"{{ if required == "true" }} required{{ /if }}{{ if placeholder }} placeholder="{{ placeholder }}"{{ /if }}{{ if pattern }} pattern="{{ pattern }}"{{ /if }}{{ if input_title }} title="{{ input_title }}"{{ /if }} class="{{ input_class ?? 'w-full rounded border border-border-medium px-4 py-3 text-base font-body bg-white focus:border-brand-green focus:ring-1 focus:ring-brand-green outline-none' }}">
