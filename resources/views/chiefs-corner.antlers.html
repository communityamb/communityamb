{{ partial:partials/page-header }}

<section class="bg-white py-[50px] max-md:py-[20px]">
    <div class="max-w-[1400px] mx-auto px-4 flex flex-row items-stretch gap-[10px] max-lg:flex-col max-md:px-0"
         x-data="{ shown: false }"
         x-intersect.once="shown = true">

        <div class="flex-1 flex flex-col justify-center bg-white p-[30px] max-lg:p-[10px] max-md:p-[10px]"
             x-cloak
             :class="shown ? 'animate-fade-in-up' : 'opacity-0'">

            <h2 class="font-display text-[34px] font-semibold uppercase leading-[65px] text-text-primary max-lg:text-[34px] max-lg:leading-[50px] max-lg:text-center max-md:text-[26px] max-md:leading-[36px] max-md:text-center">{{ chief_name }}</h2>

            <h2 class="font-display text-[28px] font-semibold leading-[42px] text-brand-green -mt-[20px] max-lg:text-[34px] max-lg:leading-[50px] max-lg:text-center max-md:text-[22px] max-md:leading-[36px] max-md:text-center">{{ chief_title }}</h2>

            <div class="w-[20%] border-t border-black my-5 max-md:mx-auto"></div>

            <div class="font-display text-[18px] font-normal leading-[30px] text-text-primary max-lg:text-center max-md:text-center max-md:text-[16px] max-md:leading-[26px] [&>h2]:hidden [&>p>a]:text-link [&>p>a:hover]:text-link-hover [&>p]:mb-[1em]">
                {{ content }}
            </div>
        </div>

        <div class="flex-1 p-[30px] max-lg:p-[10px] max-md:p-[10px]"
             x-cloak
             :class="shown ? 'animate-fade-in-up [animation-delay:300ms]' : 'opacity-0'">
            <div class="group relative overflow-hidden rounded min-h-[900px] max-md:min-h-[278px]">
                <img src="{{ chief_photo }}"
                     alt="{{ chief_photo_alt }}"
                     class="absolute inset-0 w-full h-full object-cover transition-transform duration-[1500ms] group-hover:scale-110">
            </div>
        </div>
    </div>
</section>
