{{ partial:partials/page-header }}

<!-- Gallery with Tabs -->
<section class="py-2.5 bg-white" x-data="galleryApp()" x-cloak>
    <div class="max-w-7xl mx-auto px-4">
        {{ collection:gallery_albums sort="sort_order:asc" as="albums" }}
        {{ if albums }}

        <!-- Tab Navigation -->
        <div class="flex flex-wrap border-b border-border-light mb-0">
            {{ albums }}
            <button
                @click="activeTab = '{{ slug }}'"
                :class="activeTab === '{{ slug }}'
                    ? 'text-brand-green border-b-[3px] border-brand-green font-semibold'
                    : 'text-text-secondary hover:text-brand-green border-b-[3px] border-transparent'"
                class="relative px-5 py-3 text-sm font-body font-medium transition-colors duration-200 focus:outline-none">
                {{ title }}
                <span x-show="activeTab === '{{ slug }}'" class="absolute left-1/2 -translate-x-1/2 -bottom-[2px] w-0 h-0 border-l-[8px] border-l-transparent border-r-[8px] border-r-transparent border-t-[8px] border-t-brand-green"></span>
            </button>
            {{ /albums }}
        </div>

        <!-- Tab Content Panels -->
        {{ albums }}
        <div x-show="activeTab === '{{ slug }}'"
             x-transition:enter="transition ease-out duration-300"
             x-transition:enter-start="opacity-0"
             x-transition:enter-end="opacity-100"
             data-album-id="{{ slug }}"
             class="py-2.5">

            <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-[10px]">
                {{ photos }}
                <button
                    @click="openFromEl($event)"
                    class="aspect-[3/2] overflow-hidden cursor-pointer group relative">
                    <img
                        src="{{ url }}"
                        alt="{{ alt ?? title }}"
                        class="w-full h-full object-cover transition-transform duration-[800ms] group-hover:scale-110"
                        loading="lazy">
                    <div class="absolute inset-0 bg-black/0 group-hover:bg-black/50 transition-colors duration-[800ms]"></div>
                </button>
                {{ /photos }}
            </div>
        </div>
        {{ /albums }}

        {{ else }}
        <p class="text-center text-text-muted py-12">No gallery albums available yet.</p>
        {{ /if }}
        {{ /collection:gallery_albums }}
    </div>

    <!-- Lightbox Overlay -->
    <div x-show="lightbox.open"
         x-transition:enter="transition ease-out duration-200"
         x-transition:enter-start="opacity-0"
         x-transition:enter-end="opacity-100"
         x-transition:leave="transition ease-in duration-150"
         x-transition:leave-start="opacity-100"
         x-transition:leave-end="opacity-0"
         @keydown.escape.window="lightbox.open = false"
         @keydown.left.window="if(lightbox.open) navigate(-1)"
         @keydown.right.window="if(lightbox.open) navigate(1)"
         class="fixed inset-0 z-[100] bg-black/90 flex items-center justify-center p-4">

        <!-- Close button -->
        <button @click="lightbox.open = false" class="absolute top-4 right-4 text-white hover:text-gray-300 z-10">
            {{ partial:icon name="close" class="w-8 h-8" }}
        </button>

        <!-- Previous button -->
        <button @click.stop="navigate(-1)" class="absolute left-4 top-1/2 -translate-y-1/2 text-white hover:text-gray-300 z-10 p-2">
            {{ partial:icon name="chevron-left" class="w-10 h-10" }}
        </button>

        <!-- Next button -->
        <button @click.stop="navigate(1)" class="absolute right-4 top-1/2 -translate-y-1/2 text-white hover:text-gray-300 z-10 p-2">
            {{ partial:icon name="chevron-right" class="w-10 h-10" }}
        </button>

        <!-- Image -->
        <img :src="lightbox.src" :alt="lightbox.alt" class="max-w-full max-h-[90vh] object-contain rounded" @click.stop>

        <!-- Counter -->
        <div class="absolute bottom-4 left-1/2 -translate-x-1/2 text-white/70 text-sm font-body"
             x-text="`${lightbox.index + 1} / ${lightbox.photos.length}`"></div>
    </div>
</section>

<script>
function galleryApp() {
    return {
        activeTab: '',
        albums: {},
        lightbox: { open: false, src: '', alt: '', photos: [], index: 0 },

        init() {
            this.$nextTick(() => {
                const panels = this.$el.querySelectorAll('[data-album-id]');
                panels.forEach(panel => {
                    const id = panel.dataset.albumId;
                    const imgs = Array.from(panel.querySelectorAll('img')).map(img => ({
                        src: img.src,
                        alt: img.alt || ''
                    }));
                    this.albums[id] = imgs;
                });
                // Activate the first tab
                if (panels.length > 0) {
                    this.activeTab = panels[0].dataset.albumId;
                }
            });
        },

        openFromEl(event) {
            const btn = event.currentTarget;
            const panel = btn.closest('[data-album-id]');
            const albumId = panel.dataset.albumId;
            const buttons = Array.from(panel.querySelectorAll('button'));
            const photoIndex = buttons.indexOf(btn);
            this.openLightbox(albumId, photoIndex);
        },

        openLightbox(albumId, photoIndex) {
            const photos = this.albums[albumId] || [];
            if (photos.length === 0) return;
            this.lightbox.photos = photos;
            this.lightbox.index = photoIndex;
            this.lightbox.src = photos[photoIndex].src;
            this.lightbox.alt = photos[photoIndex].alt;
            this.lightbox.open = true;
        },

        navigate(dir) {
            const len = this.lightbox.photos.length;
            if (len === 0) return;
            this.lightbox.index = (this.lightbox.index + dir + len) % len;
            this.lightbox.src = this.lightbox.photos[this.lightbox.index].src;
            this.lightbox.alt = this.lightbox.photos[this.lightbox.index].alt;
        }
    };
}
</script>
